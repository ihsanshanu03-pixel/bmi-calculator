<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CALCULATOR</title>
    <link rel="stylesheet" href="bmiCalc.css">
</head>

<body>
    <div class="wrapper">

        <!-- Left Card -->
        <div class="card">
            <div class="card-header">BMI CALCULATOR</div>
            <div class="card-body">

                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="text" id="height">
                </div>

                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="text" id="weight">
                </div>

                <h1 style="font-size: 20px;" id="result"></h1>

                <button class="calculate-btn" onclick="bmiCalculator()">Calculate Your BMI</button>

                

            </div>
        </div>

        <!-- Right Card -->
        <div class="card">
            <div class="card-header">BMI CATEGORIES</div>
            <div class="card-body">

                <table>
                    <tr>
                        <th>BMI Category</th>
                        <th>BMI Range</th>
                    </tr>
                    <tr>
                        <td>Underweight</td>
                        <td>Below 18.5</td>
                    </tr>
                    <tr>
                        <td>Healthy</td>
                        <td>18.5 – 24.9</td>
                    </tr>
                    <tr>
                        <td>Overweight</td>
                        <td>25.0 – 29.9</td>
                    </tr>
                    <tr>
                        <td>Obesity</td>
                        <td>30.0 or above</td>
                    </tr>
                </table>



            </div>
        </div>

    </div>  

    <script>

        const bmiCalculator = () => {
            const heightM = document.getElementById("height").value / 100;
            const weight = document.getElementById("weight").value;

            const result = weight / (heightM * 2)

            const resultN =document.getElementById("result")

            if (result < 18.5){
                resultN.textContent = `Underweight. Your BMi:${result.toFixed(2)}`
                resultN.style.color ="red"                
            }
            else if(result >= 18.5 && result < 24.9){
                resultN.textContent = `Healthy weight. Yours:${result.toFixed(2)}`
                resultN.style.color = "green"

            }
            else if(result >= 25 && result < 29.9){
                resultN.textContent =`OverWeight. Yours:${result.toFixed(2)}`
                resultN.style.color = "red"
        
            }
            else if(result >= 30){
                resultN.textContent =`Obesity. yours:${result.toFixed(2)}`
            }
            else{
                resultN.textContent = 'unavailable'
            }


        }

    </script>
</body>

</html>
